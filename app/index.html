<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Manager</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Custom styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- App config (generated by docker-entrypoint.sh) -->
    <script src="config.js"></script>
    <script>
        // Redirect to the login page if UI password protection is enabled
        if (window.APP_CONFIG && window.APP_CONFIG.passwordEnabled) {
            if (sessionStorage.getItem('ui-authenticated') !== 'true') {
                window.location.replace('/login.html');
            }
        }
    </script>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────── -->
<nav class="navbar-custom d-flex align-items-center justify-content-between">
    <span class="navbar-brand-text">
        <span class="brand-icon"><i class="bi bi-chat-dots-fill"></i></span>
        SMS Manager
    </span>
    <div class="d-flex align-items-center gap-2">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">
            <i class="bi bi-moon-fill" id="themeIcon"></i>
        </button>
    </div>
</nav>

<!-- ── Main content ────────────────────────────────────────── -->
<div class="container py-4" style="max-width: 760px;">

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="sendSMS-tab" data-bs-toggle="tab" data-bs-target="#sendSMS" type="button" role="tab">
                <i class="bi bi-send"></i> Send SMS
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="bookmarks-tab" data-bs-toggle="tab" data-bs-target="#bookmarks" type="button" role="tab">
                <i class="bi bi-bookmark"></i> Bookmarks
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="settings-tab" data-bs-toggle="tab" data-bs-target="#settings" type="button" role="tab">
                <i class="bi bi-gear"></i> Settings
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ── Send SMS ──────────────────────────────────────── -->
        <div id="sendSMS" class="tab-pane fade show active" role="tabpanel">
            <div class="card">
                <div class="card-title">
                    <span class="title-icon"><i class="bi bi-send-fill"></i></span>
                    Send SMS
                </div>
                <form>
                    <div class="mb-3">
                        <label for="phoneNumber" class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:var(--bg-body);border-color:var(--input-border);color:var(--text-muted);">
                                <i class="bi bi-telephone"></i>
                            </span>
                            <input type="text" class="form-control" id="phoneNumber" placeholder="+1 555 000 0000" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Type your message here…" required></textarea>
                        <div class="d-flex justify-content-end mt-1">
                            <small class="text-muted" id="charCount">0 / 160</small>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="senderID" class="form-label">Sender ID</label>
                        <input type="text" class="form-control" id="senderID" placeholder="MyBrand" required>
                    </div>
                    <div class="d-flex align-items-center justify-content-between mt-4 pt-3" style="border-top:1px solid var(--border-color);">
                        <div>
                            <span class="form-label d-block mb-1">Account Balance</span>
                            <span class="balance-badge">
                                <i class="bi bi-wallet2"></i>
                                <span id="balance">—</span>
                            </span>
                        </div>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-send me-1"></i> Send SMS
                        </button>
                    </div>
                    <div id="sendStatus"></div>
                </form>
            </div>
        </div>

        <!-- ── Bookmarks ─────────────────────────────────────── -->
        <div id="bookmarks" class="tab-pane fade" role="tabpanel">
            <div class="card">
                <div class="card-title">
                    <span class="title-icon"><i class="bi bi-bookmark-fill"></i></span>
                    Bookmarks
                </div>
                <form id="bookmarkForm" class="mb-3">
                    <div class="d-flex gap-2 mb-2">
                        <input type="text" class="form-control" id="bookmarkName" placeholder="Name" required>
                        <input type="tel" class="form-control" id="bookmarkPhone" placeholder="+1 555 000 0000" pattern="^\+?[\d\s\-().]{6,20}$" required>
                    </div>
                    <button type="submit" class="btn btn-success text-nowrap">
                        <i class="bi bi-plus-lg me-1"></i> Add Bookmark
                    </button>
                </form>
                <hr class="divider my-2">
                <ul id="bookmarkList" class="list-group mt-2"></ul>
                <p id="noBookmarks" class="text-muted text-center small mt-3 mb-0">No bookmarks yet. Add one above!</p>
            </div>
        </div>

        <!-- ── Settings ──────────────────────────────────────── -->
        <div id="settings" class="tab-pane fade" role="tabpanel">
            <div class="card">
                <div class="card-title">
                    <span class="title-icon"><i class="bi bi-gear-fill"></i></span>
                    Settings
                </div>
                <form>
                    <div class="mb-3">
                        <label for="apiToken" class="form-label">API Token</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="apiToken" placeholder="Enter API Token" required>
                            <button class="btn btn-outline-secondary" type="button" id="toggleApiToken" style="border-color:var(--input-border);color:var(--text-secondary);">
                                <i class="bi bi-eye" id="apiTokenEyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="settingsSenderID" class="form-label">Sender ID</label>
                        <input type="text" class="form-control" id="settingsSenderID" placeholder="MyBrand" required>
                    </div>
                    <div class="mb-3">
                        <label for="apiURL" class="form-label">API URL</label>
                        <input type="url" class="form-control" id="apiURL" placeholder="https://gatewayapi.com" required>
                    </div>
                    <div class="d-flex gap-2 mt-4 pt-3" style="border-top:1px solid var(--border-color);">
                        <button type="button" class="btn btn-info" id="testConnection">
                            <i class="bi bi-plug me-1"></i> Test Connection
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-floppy me-1"></i> Save Settings
                        </button>
                    </div>
                    <div id="testConnectionStatus"></div>
                </form>
            </div>
        </div>

    </div>
</div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer class="footer">© 2024 SMS Manager. All rights reserved.</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* ── Dark / light mode toggle ─────────────── */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon   = document.getElementById('themeIcon');

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        localStorage.setItem('sms-theme', theme);
    }

    themeToggle.addEventListener('click', () => {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // Restore saved preference
    applyTheme(localStorage.getItem('sms-theme') || 'light');

    /* ── Helpers ─────────────────────────────── */
    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Encryption (AES-GCM via Web Crypto API) ─ */
    // NOTE: The passphrase is embedded in the source because this is a client-side-only
    // app. Combined with a per-device random salt this provides storage obfuscation and
    // protects against casual localStorage inspection, but not against an adversary who
    // has access to both the source code and the localStorage contents.
    const _ENC_PASS   = 'sms-manager-enc-v1';
    const _ENC_PREFIX = 'enc:v1:'; // magic prefix — distinguishes encrypted from legacy plain JSON

    function _getSalt() {
        const stored = localStorage.getItem('sms-enc-salt');
        if (stored) return Uint8Array.from(atob(stored), c => c.charCodeAt(0));
        const salt = crypto.getRandomValues(new Uint8Array(16));
        localStorage.setItem('sms-enc-salt', btoa(String.fromCharCode(...salt)));
        return salt;
    }

    async function _getKey() {
        const raw = await crypto.subtle.importKey(
            'raw', new TextEncoder().encode(_ENC_PASS),
            'PBKDF2', false, ['deriveKey']
        );
        return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: _getSalt(), iterations: 100000, hash: 'SHA-256' },
            raw,
            { name: 'AES-GCM', length: 256 },
            false, ['encrypt', 'decrypt']
        );
    }

    async function encryptStore(data) {
        const key = await _getKey();
        const iv  = crypto.getRandomValues(new Uint8Array(12));
        const buf = await crypto.subtle.encrypt(
            { name: 'AES-GCM', iv }, key,
            new TextEncoder().encode(JSON.stringify(data))
        );
        const combined = new Uint8Array(12 + buf.byteLength);
        combined.set(iv);
        combined.set(new Uint8Array(buf), 12);
        return _ENC_PREFIX + btoa(String.fromCharCode(...combined));
    }

    async function decryptStore(val, fallbackDefault) {
        if (!val) return fallbackDefault;
        if (val.startsWith(_ENC_PREFIX)) {
            try {
                const combined = Uint8Array.from(atob(val.slice(_ENC_PREFIX.length)), c => c.charCodeAt(0));
                const key      = await _getKey();
                const plain    = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: combined.slice(0, 12) },
                    key, combined.slice(12)
                );
                return JSON.parse(new TextDecoder().decode(plain));
            } catch (e) {
                console.warn('decryptStore: failed to decrypt data', e);
                return fallbackDefault;
            }
        }
        // Legacy unencrypted JSON — parse and let the caller re-encrypt on next save
        try { return JSON.parse(val); } catch (_) { return fallbackDefault; }
    }

    /* ── Bookmarks ────────────────────────────── */
    const BOOKMARKS_KEY = 'sms-bookmarks';
    const bookmarkList  = document.getElementById('bookmarkList');
    const noBookmarks   = document.getElementById('noBookmarks');

    function refreshEmpty() {
        noBookmarks.style.display = bookmarkList.children.length === 0 ? '' : 'none';
    }

    async function saveBookmarks() {
        const items = [];
        bookmarkList.querySelectorAll('li').forEach(li => {
            items.push({ name: li.dataset.name, phone: li.dataset.phone });
        });
        localStorage.setItem(BOOKMARKS_KEY, await encryptStore(items));
    }

    function addBookmarkToList(name, phone) {
        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.dataset.name  = name;
        li.dataset.phone = phone;
        li.innerHTML = `
            <div class="d-flex flex-column">
                <span class="fw-semibold" style="font-size:0.9rem;">${escapeHtml(name)}</span>
                <button class="btn btn-link p-0 text-start phone-link" style="color:var(--color-primary);font-size:0.85rem;">
                    <i class="bi bi-telephone me-1"></i>${escapeHtml(phone)}
                </button>
            </div>
            <button class="btn btn-outline-danger btn-sm remove-bm"><i class="bi bi-trash"></i></button>`;
        li.querySelector('.phone-link').addEventListener('click', () => {
            document.getElementById('phoneNumber').value = phone;
            document.getElementById('sendSMS-tab').click();
        });
        li.querySelector('.remove-bm').addEventListener('click', async () => {
            li.remove();
            refreshEmpty();
            await saveBookmarks();
        });
        bookmarkList.appendChild(li);
    }

    async function loadBookmarks() {
        const raw   = localStorage.getItem(BOOKMARKS_KEY);
        const items = await decryptStore(raw, []);
        items.forEach(item => addBookmarkToList(item.name, item.phone));
        // Re-encrypt any legacy plain-JSON data on first load
        if (raw && !raw.startsWith(_ENC_PREFIX)) {
            localStorage.setItem(BOOKMARKS_KEY, await encryptStore(items));
        }
        refreshEmpty();
    }

    document.getElementById('bookmarkForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name  = document.getElementById('bookmarkName').value.trim();
        const phone = document.getElementById('bookmarkPhone').value.trim();
        if (!name || !phone) return;
        addBookmarkToList(name, phone);
        await saveBookmarks();
        document.getElementById('bookmarkName').value  = '';
        document.getElementById('bookmarkPhone').value = '';
        refreshEmpty();
    });

    /* ── Character counter ────────────────────── */
    const msgArea   = document.getElementById('message');
    const charCount = document.getElementById('charCount');
    msgArea.addEventListener('input', () => {
        charCount.textContent = `${msgArea.value.length} / 160`;
    });

    /* ── Toggle API token visibility ──────────── */
    document.getElementById('toggleApiToken').addEventListener('click', function() {
        const input = document.getElementById('apiToken');
        const icon  = document.getElementById('apiTokenEyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });

    /* ── Settings ─────────────────────────────── */
    const SETTINGS_KEY    = 'sms-settings';
    const DEFAULT_API_URL = 'https://gatewayapi.com';
    const LEGACY_API_URL  = 'https://api.gatewayapi.com'; // old default, kept for backward compat

    async function loadSettings() {
        const raw = localStorage.getItem(SETTINGS_KEY);
        const s   = await decryptStore(raw, {});
        if (s.apiToken)  document.getElementById('apiToken').value        = s.apiToken;
        if (s.senderID)  document.getElementById('settingsSenderID').value = s.senderID;
        if (s.apiURL)    document.getElementById('apiURL').value           = s.apiURL;
        if (s.senderID)  document.getElementById('senderID').value         = s.senderID;
        // Re-encrypt any legacy plain-JSON data on first load
        if (raw && !raw.startsWith(_ENC_PREFIX)) {
            localStorage.setItem(SETTINGS_KEY, await encryptStore(s));
        }
    }

    async function fetchBalance(token, baseURL) {
        if (token === undefined) {
            const s = await decryptStore(localStorage.getItem(SETTINGS_KEY), {});
            token   = s.apiToken || '';
            baseURL = s.apiURL   || '';
        }
        if (!token) return;
        const apiURL   = (baseURL || DEFAULT_API_URL).replace(/\/$/, '');
        const fetchURL = (apiURL === DEFAULT_API_URL || apiURL === LEGACY_API_URL)
            ? '/api/rest/me'
            : `${apiURL}/rest/me`;
        try {
            const res = await fetch(fetchURL, {
                headers: { 'Authorization': `Basic ${btoa(token + ':')}` }
            });
            if (res.ok) {
                const data = await res.json();
                const balanceEl = document.getElementById('balance');
                if (data.credit !== undefined) {
                    const curr = data.currency ? ` ${data.currency}` : '';
                    balanceEl.textContent = `${parseFloat(data.credit).toFixed(2)}${curr}`;
                }
            }
        } catch (err) { console.error('fetchBalance error:', err); }
    }

    document.querySelector('#settings form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const s = {
            apiToken: document.getElementById('apiToken').value.trim(),
            senderID: document.getElementById('settingsSenderID').value.trim(),
            apiURL:   document.getElementById('apiURL').value.trim()
        };
        localStorage.setItem(SETTINGS_KEY, await encryptStore(s));
        if (s.senderID) document.getElementById('senderID').value = s.senderID;
        const btn = e.submitter || document.querySelector('#settings form .btn-primary');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> Saved!';
        btn.disabled = true;
        setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 1500);
    });

    document.getElementById('testConnection').addEventListener('click', async function() {
        const apiToken = document.getElementById('apiToken').value.trim();
        const apiURL   = (document.getElementById('apiURL').value.trim() || DEFAULT_API_URL).replace(/\/$/, '');
        const btn = this;
        const statusEl = document.getElementById('testConnectionStatus');
        if (!apiToken) {
            statusEl.textContent = 'Please enter an API Token first.';
            statusEl.className = 'small text-danger mt-2';
            return;
        }
        const orig = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Testing…';
        btn.disabled = true;
        statusEl.textContent = '';
        statusEl.className = '';
        try {
            // Route through the nginx proxy (/api/ → https://gatewayapi.com/) to avoid
            // CORS issues when the configured URL matches the default GatewayAPI host.
            const fetchURL = (apiURL === DEFAULT_API_URL || apiURL === LEGACY_API_URL)
                ? '/api/rest/me'
                : `${apiURL}/rest/me`;
            const res = await fetch(fetchURL, {
                headers: { 'Authorization': `Basic ${btoa(apiToken + ':')}` }
            });
            if (res.ok) {
                btn.classList.remove('btn-info');
                btn.classList.add('btn-success');
                btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> Connected!';
                fetchBalance(apiToken, apiURL);
            } else {
                btn.classList.remove('btn-info');
                btn.classList.add('btn-danger');
                btn.innerHTML = '<i class="bi bi-x-lg me-1"></i> Failed';
                statusEl.textContent = `Error ${res.status}: ${res.statusText}`;
                statusEl.className = 'small text-danger mt-2';
            }
        } catch (err) {
            btn.classList.remove('btn-info');
            btn.classList.add('btn-danger');
            btn.innerHTML = '<i class="bi bi-x-lg me-1"></i> Error';
            statusEl.textContent = err.message;
            statusEl.className = 'small text-danger mt-2';
        }
        setTimeout(() => {
            btn.innerHTML = orig;
            btn.disabled = false;
            btn.classList.remove('btn-success', 'btn-danger');
            btn.classList.add('btn-info');
        }, 2500);
    });

    /* ── Send SMS ─────────────────────────────── */
    document.querySelector('#sendSMS form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const s        = await decryptStore(localStorage.getItem(SETTINGS_KEY), {});
        const apiToken = s.apiToken || '';
        const apiURL   = (s.apiURL || DEFAULT_API_URL).replace(/\/$/, '');
        const statusEl = document.getElementById('sendStatus');

        if (!apiToken) {
            statusEl.innerHTML = '<div class="alert alert-warning mt-3 mb-0"><i class="bi bi-exclamation-triangle me-1"></i> No API token configured. Please go to Settings first.</div>';
            return;
        }

        const phone   = document.getElementById('phoneNumber').value.trim().replace(/[\s\-().+]/g, '');
        const msisdn  = parseInt(phone, 10);
        if (!phone || isNaN(msisdn)) {
            statusEl.innerHTML = '<div class="alert alert-warning mt-3 mb-0"><i class="bi bi-exclamation-triangle me-1"></i> Please enter a valid phone number.</div>';
            return;
        }
        const message = document.getElementById('message').value.trim();
        const sender  = document.getElementById('senderID').value.trim();

        const btn  = this.querySelector('button[type="submit"]');
        const orig = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Sending…';
        btn.disabled  = true;
        statusEl.innerHTML = '';

        const fetchURL = (apiURL === DEFAULT_API_URL || apiURL === LEGACY_API_URL)
            ? '/api/rest/mtsms'
            : `${apiURL}/rest/mtsms`;

        try {
            const res  = await fetch(fetchURL, {
                method: 'POST',
                headers: {
                    'Authorization': `Basic ${btoa(apiToken + ':')}`,
                    'Content-Type':  'application/json'
                },
                body: JSON.stringify({
                    recipients: [{ msisdn }],
                    message,
                    sender
                })
            });
            let bodyText = '';
            try { bodyText = await res.text(); } catch (parseErr) { console.error('Response body parse error:', parseErr); }
            if (res.ok) {
                statusEl.innerHTML = `<div class="alert alert-success mt-3 mb-0"><i class="bi bi-check-circle me-1"></i> SMS sent successfully! (HTTP ${res.status})</div>`;
                fetchBalance(apiToken, apiURL);
            } else {
                statusEl.innerHTML = `<div class="alert alert-danger mt-3 mb-0"><i class="bi bi-x-circle me-1"></i> Failed (HTTP ${res.status} ${escapeHtml(res.statusText)}): ${escapeHtml(bodyText)}</div>`;
            }
        } catch (err) {
            statusEl.innerHTML = `<div class="alert alert-danger mt-3 mb-0"><i class="bi bi-x-circle me-1"></i> Error: ${escapeHtml(err.message)}</div>`;
        }

        btn.innerHTML = orig;
        btn.disabled  = false;
    });

    (async () => {
        await loadBookmarks();
        await loadSettings();
        await fetchBalance();
    })();
</script>
</body>
</html>
