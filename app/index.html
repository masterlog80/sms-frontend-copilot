<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel='stylesheet' href='https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css'>
    <link rel='stylesheet' href='styles.css'>
    <title>SMS Manager</title>
</head>
<body>
<div class='app'>
    <div class='header'>SMS Manager</div>
    <div class='container mt-4'>
        <ul class='nav nav-tabs'>
            <li class='nav-item'>
                <a class='nav-link active' data-toggle='tab' href='#sendSMS'>Send SMS</a>
            </li>
            <li class='nav-item'>
                <a class='nav-link' data-toggle='tab' href='#bookmarks'>Bookmarks</a>
            </li>
            <li class='nav-item'>
                <a class='nav-link' data-toggle='tab' href='#settings'>Settings</a>
            </li>
        </ul>
        <div class='tab-content mt-3'>
            <div id='sendSMS' class='tab-pane fade show active'>
                <div class='card'>
                    <h3>Send SMS</h3>
                    <form>
                        <div class='form-group'>
                            <label for='phoneNumber'>Phone Number:</label>
                            <input type='text' class='form-control' id='phoneNumber' placeholder='Enter phone number' required>
                        </div>
                        <div class='form-group'>
                            <label for='message'>Message:</label>
                            <textarea class='form-control' id='message' rows='4' placeholder='Enter your message' required></textarea>
                        </div>
                        <div class='form-group'>
                            <label for='senderID'>Sender ID:</label>
                            <input type='text' class='form-control' id='senderID' placeholder='Enter sender ID' required>
                        </div>
                        <div class='form-group'>
                            <label>Balance: </label>
                            <span id='balance'>1000 USD</span>
                        </div>
                        <button type='submit' class='btn btn-primary'>Send SMS</button>
                    </form>
                </div>
            </div>
            <div id='bookmarks' class='tab-pane fade'>
                <div class='card'>
                    <h3>Bookmarks</h3>
                    <form id='bookmarkForm'>
                        <div class='form-group'>
                            <label for='bookmark'>Add Bookmark:</label>
                            <input type='text' class='form-control' id='bookmark' placeholder='Enter bookmark URL' required>
                        </div>
                        <button type='submit' class='btn btn-success'>Add Bookmark</button>
                    </form>
                    <ul id='bookmarkList' class='list-group mt-3'></ul>
                </div>
            </div>
            <div id='settings' class='tab-pane fade'>
                <div class='card'>
                    <h3>Settings</h3>
                    <form>
                        <div class='form-group'>
                            <label for='apiToken'>API Token:</label>
                            <input type='text' class='form-control' id='apiToken' placeholder='Enter API Token' required>
                        </div>
                        <div class='form-group'>
                            <label for='settingsSenderID'>Sender ID:</label>
                            <input type='text' class='form-control' id='settingsSenderID' placeholder='Enter Sender ID' required>
                        </div>
                        <div class='form-group'>
                            <label for='apiURL'>API URL:</label>
                            <input type='text' class='form-control' id='apiURL' placeholder='Enter API URL' required>
                        </div>
                        <button type='button' class='btn btn-info'>Test Connection</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class='footer'>© 2024 SMS Manager. All rights reserved.</div>
</div>
<script src='https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js'></script>
<script src='https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js'></script>
<script>
    // Add functionality for bookmarks
    $('#bookmarkForm').submit(function(event) {
        event.preventDefault();
        let bookmark = $('#bookmark').val();
        $('#bookmarkList').append('<li class="list-group-item">' + bookmark + '</li>');
        $('#bookmark').val('');
    });
</script>
</body>
</html>
