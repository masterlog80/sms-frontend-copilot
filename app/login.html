<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SMS Manager</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Custom styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- App config (generated by docker-entrypoint.sh) -->
    <script src="config.js"></script>
    <script>
        // If password protection is not enabled, skip the login page entirely
        if (!window.APP_CONFIG || !window.APP_CONFIG.passwordEnabled) {
            window.location.replace('/index.html');
        }
    </script>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────── -->
<nav class="navbar-custom d-flex align-items-center justify-content-between">
    <span class="navbar-brand-text">
        <span class="brand-icon"><i class="bi bi-chat-dots-fill"></i></span>
        SMS Manager
    </span>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
</nav>

<!-- ── Login form (vertically centred) ────────────────────── -->
<div class="auth-wrapper">
    <div style="width:100%;max-width:440px;">
        <div class="card">
            <div class="card-title">
                <span class="title-icon"><i class="bi bi-lock-fill"></i></span>
                UI Access Password
            </div>
            <p class="text-secondary small mb-4">Enter the password to access the SMS Manager.</p>

            <form id="loginForm">
                <div class="mb-4">
                    <label for="uiPassword" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--bg-body);border-color:var(--input-border);color:var(--text-muted);">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control" id="uiPassword" name="uiPassword" placeholder="Enter password" required autofocus>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-color:var(--input-border);color:var(--text-secondary);">
                            <i class="bi bi-eye" id="passwordEyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div id="loginError" class="alert alert-danger d-none mb-3" role="alert">
                    <i class="bi bi-x-circle me-1"></i> Incorrect password. Please try again.
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
        </div>
    </div>
</div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer class="footer">© 2024 SMS Manager. All rights reserved.</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* ── Dark / light mode toggle ─────────────── */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon   = document.getElementById('themeIcon');

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        localStorage.setItem('sms-theme', theme);
    }

    themeToggle.addEventListener('click', () => {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    applyTheme(localStorage.getItem('sms-theme') || 'light');

    /* ── Toggle password visibility ───────────── */
    document.getElementById('togglePassword').addEventListener('click', function() {
        const input = document.getElementById('uiPassword');
        const icon  = document.getElementById('passwordEyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });

    /* ── Pure-JS SHA-256 (fallback for non-secure / HTTP contexts) ── */
    function sha256Fallback(str) {
        function rotr(x, n) { return (x >>> n) | (x << (32 - n)); }
        const K = [
            0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
            0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
            0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
            0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
            0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
            0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
            0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
            0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
        ];
        let h0=0x6a09e667, h1=0xbb67ae85, h2=0x3c6ef372, h3=0xa54ff53a;
        let h4=0x510e527f, h5=0x9b05688c, h6=0x1f83d9ab, h7=0x5be0cd19;
        const bytes = [];
        for (let i = 0; i < str.length; i++) {
            const c = str.charCodeAt(i);
            if (c < 0x80) bytes.push(c);
            else if (c < 0x800) { bytes.push(0xc0|(c>>6)); bytes.push(0x80|(c&0x3f)); }
            else { bytes.push(0xe0|(c>>12)); bytes.push(0x80|((c>>6)&0x3f)); bytes.push(0x80|(c&0x3f)); }
        }
        const len = bytes.length;
        bytes.push(0x80);
        while ((bytes.length % 64) !== 56) bytes.push(0);
        const bl = len * 8;
        bytes.push(0,0,0,0, (bl>>>24)&0xff, (bl>>>16)&0xff, (bl>>>8)&0xff, bl&0xff);
        for (let i = 0; i < bytes.length; i += 64) {
            const w = new Array(64);
            for (let j = 0; j < 16; j++)
                w[j] = ((bytes[i+j*4]<<24)|(bytes[i+j*4+1]<<16)|(bytes[i+j*4+2]<<8)|bytes[i+j*4+3])>>>0;
            for (let j = 16; j < 64; j++) {
                const s0 = rotr(w[j-15],7)^rotr(w[j-15],18)^(w[j-15]>>>3);
                const s1 = rotr(w[j-2],17)^rotr(w[j-2],19)^(w[j-2]>>>10);
                w[j] = (w[j-16]+s0+w[j-7]+s1)>>>0;
            }
            let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
            for (let j = 0; j < 64; j++) {
                const S1=rotr(e,6)^rotr(e,11)^rotr(e,25), ch=(e&f)^(~e&g);
                const t1=(h+S1+ch+K[j]+w[j])>>>0;
                const S0=rotr(a,2)^rotr(a,13)^rotr(a,22), maj=(a&b)^(a&c)^(b&c);
                const t2=(S0+maj)>>>0;
                h=g; g=f; f=e; e=(d+t1)>>>0; d=c; c=b; b=a; a=(t1+t2)>>>0;
            }
            h0=(h0+a)>>>0; h1=(h1+b)>>>0; h2=(h2+c)>>>0; h3=(h3+d)>>>0;
            h4=(h4+e)>>>0; h5=(h5+f)>>>0; h6=(h6+g)>>>0; h7=(h7+h)>>>0;
        }
        return [h0,h1,h2,h3,h4,h5,h6,h7].map(v=>v.toString(16).padStart(8,'0')).join('');
    }

    async function hashPassword(password) {
        if (window.crypto && window.crypto.subtle) {
            // Preferred: native Web Crypto API (requires secure context / HTTPS)
            const msgBuffer  = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray  = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        // Fallback: pure-JS SHA-256 (works in non-secure HTTP contexts)
        return sha256Fallback(password);
    }

    /* ── Login form submission ─────────────────── */
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn      = document.getElementById('loginBtn');
        const errorEl  = document.getElementById('loginError');
        const password = document.getElementById('uiPassword').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Signing in…';
        errorEl.classList.add('d-none');

        try {
            const hashHex = await hashPassword(password);

            if (hashHex === window.APP_CONFIG.passwordHash) {
                sessionStorage.setItem('ui-authenticated', 'true');
                window.location.replace('/index.html');
            } else {
                errorEl.classList.remove('d-none');
                document.getElementById('uiPassword').value = '';
                document.getElementById('uiPassword').focus();
            }
        } catch (err) {
            errorEl.textContent = 'An error occurred. Please try again.';
            errorEl.classList.remove('d-none');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> Sign In';
    });
</script>
</body>
</html>
