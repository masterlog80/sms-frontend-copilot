<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication – SMS Manager</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Custom styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────── -->
<nav class="navbar-custom d-flex align-items-center justify-content-between">
    <span class="navbar-brand-text">
        <span class="brand-icon"><i class="bi bi-chat-dots-fill"></i></span>
        SMS Manager
    </span>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
</nav>

<!-- ── Auth form (vertically centred) ─────────────────────── -->
<div class="auth-wrapper">
    <div style="width:100%;max-width:440px;">
        <div class="card">
            <div class="card-title">
                <span class="title-icon"><i class="bi bi-shield-lock-fill"></i></span>
                Configure API Access
            </div>
            <p class="text-secondary small mb-4">Enter your GatewayAPI credentials to get started.</p>

            <form id="authForm">
                <div class="mb-3">
                    <label for="apiToken" class="form-label">API Token</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--bg-body);border-color:var(--input-border);color:var(--text-muted);">
                            <i class="bi bi-key"></i>
                        </span>
                        <input type="password" class="form-control" id="apiToken" name="apiToken" placeholder="Enter API Token" required>
                        <button class="btn btn-outline-secondary" type="button" id="toggleToken" style="border-color:var(--input-border);color:var(--text-secondary);">
                            <i class="bi bi-eye" id="tokenEyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="senderId" class="form-label">Sender ID</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--bg-body);border-color:var(--input-border);color:var(--text-muted);">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" class="form-control" id="senderId" name="senderId" placeholder="MyBrand" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-floppy me-1"></i> Save &amp; Continue
                </button>
            </form>
        </div>
    </div>
</div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer class="footer">© 2024 SMS Manager. All rights reserved.</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
    /* ── Dark / light mode toggle ─────────────── */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon   = document.getElementById('themeIcon');

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        localStorage.setItem('sms-theme', theme);
    }

    themeToggle.addEventListener('click', () => {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    applyTheme(localStorage.getItem('sms-theme') || 'light');

    /* ── Toggle API token visibility ──────────── */
    document.getElementById('toggleToken').addEventListener('click', function() {
        const input = document.getElementById('apiToken');
        const icon  = document.getElementById('tokenEyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
</body>
</html>
