version: '3.8'

services:
  sms-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - GATEWAYAPI_BASE_URL=https://api.gatewayapi.com
    volumes:
      - ./app:/usr/share/nginx/html
    restart: unless-stopped
    networks:
      - sms-network

networks:
  sms-network:
    driver: bridge