<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Page</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <div class="header">SMS Manager</div>
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card">
                        <h2 class="mb-3">Configure API Token and Sender ID</h2>
                        <form id="authForm">
                            <div class="form-group">
                                <label for="apiToken">API Token:</label>
                                <input type="text" class="form-control" id="apiToken" name="apiToken" placeholder="Enter API Token" required>
                            </div>
                            <div class="form-group">
                                <label for="senderId">Sender ID:</label>
                                <input type="text" class="form-control" id="senderId" name="senderId" placeholder="Enter Sender ID" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">© 2024 SMS Manager. All rights reserved.</div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
