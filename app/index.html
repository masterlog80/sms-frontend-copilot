<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Sending Page</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        textarea { width: 100%; height: 100px; }
        .counter { margin: 10px 0; }
        #balance { font-weight: bold; }
        #bookmarks { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Send an SMS</h1>
        <label for="phone-input">Phone Number:</label>
        <input type="text" id="phone-input" placeholder="Enter phone number" />
        <div class="counter" id="char-count">Character Count: 0</div>
        <textarea id="message-input" placeholder="Type your message here..."></textarea>
        <div class="counter">Remaining Characters: <span id="remaining-characters">160</span></div>
        <div id="balance">Balance: $10.00</div>
        <button id="send-button">Send SMS</button>
        <div id="bookmarks">
            <h2>Bookmarks</h2>
            <ul>
                <li><a href="#">Bookmark 1</a></li>
                <li><a href="#">Bookmark 2</a></li>
            </ul>
        </div>
    </div>
    <script>
        const messageInput = document.getElementById('message-input');
        const charCountElement = document.getElementById('char-count');
        const remainingCharactersElement = document.getElementById('remaining-characters');
        const maxChars = 160;

        messageInput.addEventListener('input', () => {
            const charCount = messageInput.value.length;
            charCountElement.textContent = `Character Count: ${charCount}`;
            remainingCharactersElement.textContent = maxChars - charCount;
        });
    </script>
</body>
</html>
