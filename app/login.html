<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SMS Manager</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Custom styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- App config (generated by docker-entrypoint.sh) -->
    <script src="config.js"></script>
    <script>
        // If password protection is not enabled, skip the login page entirely
        if (!window.APP_CONFIG || !window.APP_CONFIG.passwordEnabled) {
            window.location.replace('/index.html');
        }
    </script>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────── -->
<nav class="navbar-custom d-flex align-items-center justify-content-between">
    <span class="navbar-brand-text">
        <span class="brand-icon"><i class="bi bi-chat-dots-fill"></i></span>
        SMS Manager
    </span>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
</nav>

<!-- ── Login form (vertically centred) ────────────────────── -->
<div class="auth-wrapper">
    <div style="width:100%;max-width:440px;">
        <div class="card">
            <div class="card-title">
                <span class="title-icon"><i class="bi bi-lock-fill"></i></span>
                UI Access Password
            </div>
            <p class="text-secondary small mb-4">Enter the password to access the SMS Manager.</p>

            <form id="loginForm">
                <div class="mb-4">
                    <label for="uiPassword" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--bg-body);border-color:var(--input-border);color:var(--text-muted);">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control" id="uiPassword" name="uiPassword" placeholder="Enter password" required autofocus>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border-color:var(--input-border);color:var(--text-secondary);">
                            <i class="bi bi-eye" id="passwordEyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div id="loginError" class="alert alert-danger d-none mb-3" role="alert">
                    <i class="bi bi-x-circle me-1"></i> Incorrect password. Please try again.
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
        </div>
    </div>
</div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer class="footer">© 2024 SMS Manager. All rights reserved.</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* ── Dark / light mode toggle ─────────────── */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon   = document.getElementById('themeIcon');

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        localStorage.setItem('sms-theme', theme);
    }

    themeToggle.addEventListener('click', () => {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    applyTheme(localStorage.getItem('sms-theme') || 'light');

    /* ── Toggle password visibility ───────────── */
    document.getElementById('togglePassword').addEventListener('click', function() {
        const input = document.getElementById('uiPassword');
        const icon  = document.getElementById('passwordEyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });

    /* ── Login form submission ─────────────────── */
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn      = document.getElementById('loginBtn');
        const errorEl  = document.getElementById('loginError');
        const password = document.getElementById('uiPassword').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Signing in…';
        errorEl.classList.add('d-none');

        try {
            // Hash the entered password with SHA-256 using the Web Crypto API
            const msgBuffer  = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray  = Array.from(new Uint8Array(hashBuffer));
            const hashHex    = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashHex === window.APP_CONFIG.passwordHash) {
                sessionStorage.setItem('ui-authenticated', 'true');
                window.location.replace('/index.html');
            } else {
                errorEl.classList.remove('d-none');
                document.getElementById('uiPassword').value = '';
                document.getElementById('uiPassword').focus();
            }
        } catch (err) {
            errorEl.textContent = 'An error occurred. Please try again.';
            errorEl.classList.remove('d-none');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> Sign In';
    });
</script>
</body>
</html>
