<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Manager</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <!-- Custom styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────── -->
<nav class="navbar-custom d-flex align-items-center justify-content-between">
    <span class="navbar-brand-text">
        <span class="brand-icon"><i class="bi bi-chat-dots-fill"></i></span>
        SMS Manager
    </span>
    <div class="d-flex align-items-center gap-2">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">
            <i class="bi bi-moon-fill" id="themeIcon"></i>
        </button>
    </div>
</nav>

<!-- ── Main content ────────────────────────────────────────── -->
<div class="container py-4" style="max-width: 760px;">

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="sendSMS-tab" data-bs-toggle="tab" data-bs-target="#sendSMS" type="button" role="tab">
                <i class="bi bi-send"></i> Send SMS
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="bookmarks-tab" data-bs-toggle="tab" data-bs-target="#bookmarks" type="button" role="tab">
                <i class="bi bi-bookmark"></i> Bookmarks
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="settings-tab" data-bs-toggle="tab" data-bs-target="#settings" type="button" role="tab">
                <i class="bi bi-gear"></i> Settings
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ── Send SMS ──────────────────────────────────────── -->
        <div id="sendSMS" class="tab-pane fade show active" role="tabpanel">
            <div class="card">
                <div class="card-title">
                    <span class="title-icon"><i class="bi bi-send-fill"></i></span>
                    Send SMS
                </div>
                <form>
                    <div class="mb-3">
                        <label for="phoneNumber" class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background:var(--bg-body);border-color:var(--input-border);color:var(--text-muted);">
                                <i class="bi bi-telephone"></i>
                            </span>
                            <input type="text" class="form-control" id="phoneNumber" placeholder="+1 555 000 0000" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Type your message here…" required></textarea>
                        <div class="d-flex justify-content-end mt-1">
                            <small class="text-muted" id="charCount">0 / 160</small>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="senderID" class="form-label">Sender ID</label>
                        <input type="text" class="form-control" id="senderID" placeholder="MyBrand" required>
                    </div>
                    <div class="d-flex align-items-center justify-content-between mt-4 pt-3" style="border-top:1px solid var(--border-color);">
                        <div>
                            <span class="form-label d-block mb-1">Account Balance</span>
                            <span class="balance-badge">
                                <i class="bi bi-wallet2"></i>
                                <span id="balance">1,000 USD</span>
                            </span>
                        </div>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-send me-1"></i> Send SMS
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ── Bookmarks ─────────────────────────────────────── -->
        <div id="bookmarks" class="tab-pane fade" role="tabpanel">
            <div class="card">
                <div class="card-title">
                    <span class="title-icon"><i class="bi bi-bookmark-fill"></i></span>
                    Bookmarks
                </div>
                <form id="bookmarkForm" class="mb-3">
                    <div class="d-flex gap-2 mb-2">
                        <input type="text" class="form-control" id="bookmarkName" placeholder="Name" required>
                        <input type="tel" class="form-control" id="bookmarkPhone" placeholder="+1 555 000 0000" pattern="^\+?[\d\s\-().]{6,20}$" required>
                    </div>
                    <button type="submit" class="btn btn-success text-nowrap">
                        <i class="bi bi-plus-lg me-1"></i> Add Bookmark
                    </button>
                </form>
                <hr class="divider my-2">
                <ul id="bookmarkList" class="list-group mt-2"></ul>
                <p id="noBookmarks" class="text-muted text-center small mt-3 mb-0">No bookmarks yet. Add one above!</p>
            </div>
        </div>

        <!-- ── Settings ──────────────────────────────────────── -->
        <div id="settings" class="tab-pane fade" role="tabpanel">
            <div class="card">
                <div class="card-title">
                    <span class="title-icon"><i class="bi bi-gear-fill"></i></span>
                    Settings
                </div>
                <form>
                    <div class="mb-3">
                        <label for="apiToken" class="form-label">API Token</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="apiToken" placeholder="Enter API Token" required>
                            <button class="btn btn-outline-secondary" type="button" id="toggleApiToken" style="border-color:var(--input-border);color:var(--text-secondary);">
                                <i class="bi bi-eye" id="apiTokenEyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="settingsSenderID" class="form-label">Sender ID</label>
                        <input type="text" class="form-control" id="settingsSenderID" placeholder="MyBrand" required>
                    </div>
                    <div class="mb-3">
                        <label for="apiURL" class="form-label">API URL</label>
                        <input type="url" class="form-control" id="apiURL" placeholder="https://api.gatewayapi.com" required>
                    </div>
                    <div class="d-flex gap-2 mt-4 pt-3" style="border-top:1px solid var(--border-color);">
                        <button type="button" class="btn btn-info" id="testConnection">
                            <i class="bi bi-plug me-1"></i> Test Connection
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-floppy me-1"></i> Save Settings
                        </button>
                    </div>
                    <div id="testConnectionStatus"></div>
                </form>
            </div>
        </div>

    </div>
</div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer class="footer">© 2024 SMS Manager. All rights reserved.</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* ── Dark / light mode toggle ─────────────── */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon   = document.getElementById('themeIcon');

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        localStorage.setItem('sms-theme', theme);
    }

    themeToggle.addEventListener('click', () => {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // Restore saved preference
    applyTheme(localStorage.getItem('sms-theme') || 'light');

    /* ── Helpers ─────────────────────────────── */
    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Bookmarks ────────────────────────────── */
    const BOOKMARKS_KEY = 'sms-bookmarks';
    const bookmarkList  = document.getElementById('bookmarkList');
    const noBookmarks   = document.getElementById('noBookmarks');

    function refreshEmpty() {
        noBookmarks.style.display = bookmarkList.children.length === 0 ? '' : 'none';
    }

    function saveBookmarks() {
        const items = [];
        bookmarkList.querySelectorAll('li').forEach(li => {
            items.push({ name: li.dataset.name, phone: li.dataset.phone });
        });
        localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(items));
    }

    function addBookmarkToList(name, phone) {
        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.dataset.name  = name;
        li.dataset.phone = phone;
        li.innerHTML = `
            <div class="d-flex flex-column">
                <span class="fw-semibold" style="font-size:0.9rem;">${escapeHtml(name)}</span>
                <button class="btn btn-link p-0 text-start phone-link" style="color:var(--color-primary);font-size:0.85rem;">
                    <i class="bi bi-telephone me-1"></i>${escapeHtml(phone)}
                </button>
            </div>
            <button class="btn btn-outline-danger btn-sm remove-bm"><i class="bi bi-trash"></i></button>`;
        li.querySelector('.phone-link').addEventListener('click', () => {
            document.getElementById('phoneNumber').value = phone;
            document.getElementById('sendSMS-tab').click();
        });
        li.querySelector('.remove-bm').addEventListener('click', () => {
            li.remove();
            refreshEmpty();
            saveBookmarks();
        });
        bookmarkList.appendChild(li);
    }

    function loadBookmarks() {
        const items = JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || '[]');
        items.forEach(item => addBookmarkToList(item.name, item.phone));
        refreshEmpty();
    }

    document.getElementById('bookmarkForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name  = document.getElementById('bookmarkName').value.trim();
        const phone = document.getElementById('bookmarkPhone').value.trim();
        if (!name || !phone) return;
        addBookmarkToList(name, phone);
        saveBookmarks();
        document.getElementById('bookmarkName').value  = '';
        document.getElementById('bookmarkPhone').value = '';
        refreshEmpty();
    });

    loadBookmarks();

    /* ── Character counter ────────────────────── */
    const msgArea   = document.getElementById('message');
    const charCount = document.getElementById('charCount');
    msgArea.addEventListener('input', () => {
        charCount.textContent = `${msgArea.value.length} / 160`;
    });

    /* ── Toggle API token visibility ──────────── */
    document.getElementById('toggleApiToken').addEventListener('click', function() {
        const input = document.getElementById('apiToken');
        const icon  = document.getElementById('apiTokenEyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });

    /* ── Settings ─────────────────────────────── */
    const SETTINGS_KEY  = 'sms-settings';
    const DEFAULT_API_URL = 'https://api.gatewayapi.com';

    function loadSettings() {
        const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
        if (s.apiToken)  document.getElementById('apiToken').value        = s.apiToken;
        if (s.senderID)  document.getElementById('settingsSenderID').value = s.senderID;
        if (s.apiURL)    document.getElementById('apiURL').value           = s.apiURL;
        if (s.senderID)  document.getElementById('senderID').value         = s.senderID;
    }

    document.querySelector('#settings form').addEventListener('submit', function(e) {
        e.preventDefault();
        const s = {
            apiToken: document.getElementById('apiToken').value.trim(),
            senderID: document.getElementById('settingsSenderID').value.trim(),
            apiURL:   document.getElementById('apiURL').value.trim()
        };
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
        if (s.senderID) document.getElementById('senderID').value = s.senderID;
        const btn = e.submitter || document.querySelector('#settings form .btn-primary');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> Saved!';
        btn.disabled = true;
        setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 1500);
    });

    document.getElementById('testConnection').addEventListener('click', async function() {
        const apiToken = document.getElementById('apiToken').value.trim();
        const apiURL   = (document.getElementById('apiURL').value.trim() || DEFAULT_API_URL).replace(/\/$/, '');
        const btn = this;
        const statusEl = document.getElementById('testConnectionStatus');
        if (!apiToken) {
            statusEl.textContent = 'Please enter an API Token first.';
            statusEl.className = 'small text-danger mt-2';
            return;
        }
        const orig = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Testing…';
        btn.disabled = true;
        statusEl.textContent = '';
        statusEl.className = '';
        try {
            const res = await fetch(`${apiURL}/rest/me`, {
                headers: { 'Authorization': `Bearer ${apiToken}` }
            });
            if (res.ok) {
                btn.classList.remove('btn-info');
                btn.classList.add('btn-success');
                btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> Connected!';
            } else {
                btn.classList.remove('btn-info');
                btn.classList.add('btn-danger');
                btn.innerHTML = '<i class="bi bi-x-lg me-1"></i> Failed';
                statusEl.textContent = `Error ${res.status}: ${res.statusText}`;
                statusEl.className = 'small text-danger mt-2';
            }
        } catch (err) {
            btn.classList.remove('btn-info');
            btn.classList.add('btn-danger');
            btn.innerHTML = '<i class="bi bi-x-lg me-1"></i> Error';
            statusEl.textContent = err.message;
            statusEl.className = 'small text-danger mt-2';
        }
        setTimeout(() => {
            btn.innerHTML = orig;
            btn.disabled = false;
            btn.classList.remove('btn-success', 'btn-danger');
            btn.classList.add('btn-info');
        }, 2500);
    });

    loadSettings();
</script>
</body>
</html>
