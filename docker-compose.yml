services:
  sms-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:80"
    environment:
      - GATEWAYAPI_BASE_URL=https://api.gatewayapi.com
      # Set PASSWORD_UI to enable password protection for the UI.
      # Leave unset (or remove the line) to disable password protection.
      # - PASSWORD_UI=changeme
    restart: unless-stopped
    depends_on:
      - storage
    networks:
      - sms-network

  storage:
    build:
      context: ./storage
      dockerfile: Dockerfile
    volumes:
      - sms-data:/data
    restart: unless-stopped
    networks:
      - sms-network

volumes:
  sms-data:

networks:
  sms-network:
    driver: bridge
