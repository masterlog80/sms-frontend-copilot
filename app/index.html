<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SMS Frontend</title><link rel="icon" type="image/png" href="favicon.ico"><link rel="stylesheet" href="styles.css"></head><body><div class="container"><nav class="navbar"><h1>SMS Sender</h1><a href="auth.html" class="auth-link">⚙️ Settings</a></nav><main class="main-content"><section class="send-sms"><h2>Send SMS</h2><div class="form-group"><label for="phone">Destination Phone Number (without +):</label><input type="text" id="phone" placeholder="1234567890" required></div><div class="form-group"><label for="message">Message:</label><textarea id="message" placeholder="Type your message..." maxlength="160"></textarea><div class="char-info"><span id="charCount">0</span>/160 characters</div></div><div class="balance-display">Balance: <strong>$<span id="balance">0.00</span></strong></div><button id="sendBtn" class="btn-primary">Send SMS</button></section><section class="bookmarks"><h2>Quick Bookmarks</h2><div id="bookmarksList" class="bookmarks-list"></div><div class="form-group"><input type="text" id="bookmarkInput" placeholder="Add bookmark..."><button id="addBookmarkBtn" class="btn-secondary">Add</button></div></section><div id="message-status" class="message-status"></div></main></div><script src="app.js"></script></body></html>
